# tloginsvr.toml — TLoginSvrAsio configuration.
# Pass via `tloginsvr_asio --config /path/to/this/file`.
# All sections + keys are optional; defaults below match the shipped
# legacy server's hardcoded behavior so a missing config still gives
# you a working binary.

[server]
# TCP port for the game protocol (CS_LOGIN_REQ et al). 4816 matches
# the TSERVER row for bType=TLOGIN_GSP in the legacy schema.
port = 4816

# Accepted client wire versions. List of CS_LOGIN_REQ.wVersion values
# the server will accept; everything else gets LR_VERSION. Default if
# the key is omitted is the single legacy value 0x2918 (matches
# ProtocolBase.h::TVERSION in the shipped client). Extend the list
# during rolling upgrades or QA windows that need to flight multiple
# client builds against the same server.
# accepted_versions = [0x2918]

# Deployment locale — selects the client wire variant (JP appends a
# bChanneling byte to CS_LOGIN_REQ) and the per-locale character
# name charset for CS_CREATECHAR_REQ. One of:
#   us | germany | taiwan | japan | korea | russia
# Default "us" (ASCII-only) matches the legacy non-localized build.
# nation = "us"

# IPv4 dotted-decimal of the TControlSvr peer. CT_* control packets
# (event registry, service monitor) are accepted ONLY from this
# address — mirroring the legacy m_bSessionType=SESSION_SERVER gate.
# Empty / omitted = gate open (useful for in-process tests on
# 127.0.0.1; production deploys MUST set this to the operator's
# TControlSvr IP).
# control_server_ip = "10.0.0.5"

# CS_HOTSEND_REQ heartbeat — silently dropped by the server. The
# legacy client fires it after every GROUPLIST_ACK / CHANNELLIST_ACK
# (its exec-file integrity probe). Anti-cheat validation of those
# probes is intentionally out of scope for this rewrite; no config
# knob is exposed.

[crypto]
# RC4 wire-encryption layer for the legacy-client direction. Set true
# in server-server test environments where neither end runs the
# legacy client wire codec.
disable_rc4 = false

# Override the default legacy wire secret (Session.cpp:22's
# g_strSecretKey) with a hex-encoded byte string. Uncomment + edit
# to use a custom secret — but note that any real legacy client will
# stop decrypting your traffic if this drifts from what the client
# was built with.
#
# IMPORTANT: The hex bytes go into the RC4 key derivation verbatim.
# The legacy default secret is fed in as `strlen + 1` bytes —
# i.e. INCLUDING the trailing NUL — so operators porting the
# default with a custom prefix MUST include "00" at the end of the
# hex string. Drop the "00" and clients won't decrypt anything.
# rc4_secret_hex = "4135243824414653313341313a3a2d31312321..."

[log]
# spdlog severity: trace, debug, info, warn, error, critical, off
level = "info"

[health]
# HTTP /healthz endpoint on a separate port. Used by k8s liveness/
# readiness probes and load balancers. Set 0 to disable entirely.
port = 8815

# ---------------------------------------------------------------------------
# Databases
# ---------------------------------------------------------------------------
# The legacy schema is split:
#   [database]        — TGLOBAL: accounts (TACCOUNT_PW), sessions
#                       (TCURRENTUSER), server registry (TSERVER, TIPADDR,
#                       TGROUP, TCHANNEL), cross-world directory
#                       (TALLCHARTABLE), name reservations.
#   [database.world]  — TGAME:   per-world chars (TCHARTABLE), items
#                       (TITEMTABLE), guilds (TGUILDMEMBERTABLE),
#                       BR/BOW shard tables.
#
# Leaving [database] empty keeps the binary in in-memory dev mode.
# Configuring [database] but not [database.world] runs auth + session +
# map locator against TGLOBAL and falls back to in-memory for char ops.

[database]
# backend = "odbc"     # odbc | postgresql | sqlite3
# connection_string = "DRIVER={ODBC Driver 17 for SQL Server};SERVER=localhost;DATABASE=TGLOBAL_RAGEZONE;Trusted_Connection=yes"
# pool_size = 8

[database.world]
# backend = "odbc"
# connection_string = "DRIVER={ODBC Driver 17 for SQL Server};SERVER=localhost;DATABASE=TGAME_RAGEZONE;Trusted_Connection=yes"
# pool_size = 8

# ---------------------------------------------------------------------------
# SMTP relay for 2FA security codes
# ---------------------------------------------------------------------------
# Leave [smtp] empty (or omit it) for log-only mode — the SpdlogSmtpClient
# default writes each would-be email to the spdlog stream so you can
# read codes from the log during dev. Setting `host` switches to the
# real AsioSmtpClient.
#
# Auth: provide `username` + `password` for AUTH LOGIN; leave both
# empty to submit anonymously (relay must accept the server IP).
#
# Notes:
#   * No STARTTLS / SMTPS support. For TLS, run a local Postfix
#     submission relay on 127.0.0.1 that fronts to your real provider.
#   * Each Send opens a one-shot connection (open → 1 message → close).
#     Fine for the 2FA volume (one mail per new-device login).

[smtp]
# host = "127.0.0.1"
# port = 25
# from_address = "noreply@example.com"
# from_display = "4Story Login"
# username = ""
# password = ""
