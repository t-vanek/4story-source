# tmapsvr.toml — TMapSvrAsio configuration.
# Pass via `tmapsvr_asio --config /path/to/this/file`.
# All sections + keys are optional; defaults below match the legacy
# TMapSvr.exe so a missing config still gives a working binary.

[server]
# TCP port the game client connects to. 5815 = DEF_MAPPORT (legacy
# TServer row bType=3).
port = 5815
# Hard cap on concurrent live sessions. Each AsioSession holds a
# decoded packet buffer + crypto state — sized for the legacy 8K
# default. Lower for dev / lab; raise carefully (kernel fd budget,
# RAM).
max_connections = 8000

[crypto]
# Hex-encoded RC4 secret key for client ↔ map encryption. Server-side
# convention (matches CSession::Decrypt path): we run RC4 on inbound
# only — outbound stays XOR. The hex string is decoded byte-for-byte,
# operator must include any trailing NUL byte the legacy default
# requires.
#
# Leave commented (or set disable = true) to run plain-wire — useful
# for smoke tests with netcat / packet replay tooling.
# rc4_secret_hex = "0102030405060708090a0b0c0d0e0f00"
disable = true

[mode]
# Game-mode selector — replaces the legacy BR_COMPILE_MODE /
# BOW_COMPILE_MODE preprocessor flags with a run-time switch so the
# same binary serves any mode.
#   pve   normal PvE/PvP gameplay (default)
#   bow   Battle of Worlds match — TBowSettings constants apply
#   br    Battle Royale match    — BRSettings constants apply
type = "pve"

[world]
# TWorldSvr peer this map talks to. The map↔world link carries MW_/DM_/
# SS_ traffic (char registration on connect, party/chat relay, item
# routing) — required for the F5+ char registration flow. Setting port
# = 0 disables the outbound link entirely; CS_CONNECT_REQ still works
# but MW_ADDCHAR_ACK is dropped with a log line. Production deploys
# must point this at the running TWorldSvr.
host = "127.0.0.1"
port = 0

[health]
# Optional /healthz HTTP endpoint on a separate port. Set to 0 to
# disable. Used by k8s liveness/readiness probes and external
# load-balancer health checks.
port = 8916

[log]
# spdlog level. One of: trace | debug | info | warn | error | critical | off
level = "info"

[database]
# TUSER pool — TCURRENTUSER holds the session token TLoginSvrAsio
# wrote at login; the map server reads it back to validate the
# CS_VERIFYSESSION_REQ handshake in F4. TCHARTABLE (char load/save)
# also lives in TUSER and gets validated when F5 lands.
#
# backend: one of  odbc | postgresql | sqlite3
# Production uses ODBC against SQL Server; the SOCI connection
# string follows the standard ODBC driver syntax.
backend = "odbc"
connection_string = "DRIVER={ODBC Driver 17 for SQL Server};SERVER=localhost;DATABASE=TUSER_RAGEZONE;Trusted_Connection=yes;TrustServerCertificate=yes"
pool_size = 4
# Off-loop SOCI worker pool. 0 disables (run queries on the
# io_context thread — fine for low-load dev). Production should
# keep this >= 2 so the hot lookup paths in F4 / F5 don't stall
# the accept loop.
worker_threads = 4
