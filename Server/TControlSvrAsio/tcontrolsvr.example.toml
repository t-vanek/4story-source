# TControlSvrAsio example config — F1 scaffold.
#
# The F1 binary runs without a database: operators auth against the
# in-memory FakeOperatorAuthService seeded from [[fake.operators]],
# and the post-login list acks come from [[fake.groups]] /
# [[fake.machines]] / [[fake.types]]. F2 swaps these for SOCI loads
# from TGLOBAL_RAGEZONE.

[server]
port       = 12000   # operator + peer TCP listener
auto_start = 0       # initial value of the auto-restart flag

# When [database] is set the SOCI repos load the inventory + auth
# from TGLOBAL_RAGEZONE instead of from the in-memory fakes below.
# `worker_threads` controls a boost::asio::thread_pool that handlers
# offload SOCI calls onto via `fourstory::db::CoOffload` — keeps
# the io_context responsive for other operators + the 1Hz peer
# monitor while a DB query is in flight. Set worker_threads=0 to
# run SOCI in-line on the io_context (legacy F1–F5 behavior).
# [database]
# backend           = "mssql"
# connection_string = "DSN=4story;UID=sa;PWD=…"
# pool_size         = 4
# worker_threads    = 2

[health]
port = 18086

[admin]
bind = "127.0.0.1"
port = 18186

# Per-IP rate limit on CT_OPLOGIN_REQ / CT_STLOGIN_REQ. Token bucket
# — `burst` attempts allowed in quick succession, then one refill
# every `refill_seconds`. Defensive hardening against credential-
# stuffing from a single peer. Set burst=0 to disable.
[login_rate]
burst          = 5
refill_seconds = 10

# Live inventory refresh — re-reads TMACHINE / TGROUP / TSVRTYPE /
# TSERVER / TIPADDR every N seconds so topology edits flow into the
# operator GUI without a daemon restart. Only meaningful when
# [database] is configured. 0 = load once at boot (legacy behavior).
[inventory]
refresh_seconds = 30

[log]
level = "info"

# --- F1 fakes ---------------------------------------------------------

[[fake.operators]]
id        = "gm_alpha"
password  = "secret"
authority = 3    # MANAGER_USER — kick / move / position
# Authority values: 1 = MANAGER_ALL (console / 127.0.0.1 only),
# 2 = MANAGER_CONTROL, 3 = MANAGER_USER, 4 = MANAGER_SERVICE,
# 5..7 = MANAGER_GMLEVEL1..3. See TControlType.h.

[[fake.operators]]
id        = "ops_console"
password  = "console-pw"
authority = 1    # full control — rejected from non-loopback IPs

[[fake.groups]]
id   = 1
name = "World1"

[[fake.machines]]
id   = 1
name = "host-a"

[[fake.types]]
id   = 2
name = "LoginSvr"

[[fake.types]]
id   = 3
name = "MapSvr"
